# Device Skill Manifest — copy and fill in for your device.
# This file is parsed into a SkillManifest (see src/device_skills/schema.py).

name: "my-device"                    # unique slug (lowercase, hyphens)
version: "0.1.0"                     # semver
vendor: "Vendor Name"
category: "plate-reader"             # plate-reader | nmr | microscope | flow-cytometer | ...
model: ""                            # specific model (e.g. "Synergy H1")
description: "Short description of the device"
platform: ""                         # windows | macos | linux | cross
interface_type: "file_based"         # file_based | serial | network_api | gpio_daq | software_bridge | gui
control_modes:                       # which modes this skill supports
  - offline
capabilities:                        # structured device capabilities
  can_observe: []                    # what it can measure: absorbance, fluorescence, 1H-NMR, ...
  can_control: []                    # what it can actuate: temperature, shaking, ...
  data_formats: []                   # output formats: csv, xlsx, fid, tif, ...
  supports_streaming: false          # can stream data in real-time
safety_level: "normal"               # normal | strict | critical
dependencies: []                     # extra pip packages (e.g. nmrglue)
