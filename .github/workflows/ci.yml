name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,bruker-topspin,biotek-gen5]"
      - name: Ruff check
        run: ruff check src/ devices/
      - name: Ruff format check
        run: ruff format --check src/ devices/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: pip install -e ".[dev,bruker-topspin,biotek-gen5]"
      - name: Run tests
        run: python -m pytest tests/ devices/ -v --tb=short
