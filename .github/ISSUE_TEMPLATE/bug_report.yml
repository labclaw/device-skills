name: Bug Report
description: Report a bug in device-skills
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device
      description: Which device skill is affected?
      placeholder: e.g., bruker-topspin, biotek-gen5
  - type: input
    id: python-version
    attributes:
      label: Python Version
      placeholder: e.g., 3.11.9
