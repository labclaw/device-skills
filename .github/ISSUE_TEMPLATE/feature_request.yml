name: Feature Request
description: Suggest a new feature or device skill
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device (if applicable)
      description: Which device is this for?
      placeholder: e.g., new device name or existing device
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any other approaches you considered?
